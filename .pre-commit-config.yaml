# Git pre-commit gates. Mirrors the in-session Claude Code hook
# (.claude/hooks/check_edited_file.py) so the same standards apply to commits
# made outside a Claude session. All hooks are `local` so nothing is downloaded
# and the existing backend venv / npm are reused.
#
# One-time setup (per clone):
#   backend/.venv/Scripts/python.exe -m pip install -e "backend[dev]"
#   backend/.venv/Scripts/pre-commit install
#
# There is deliberately NO pre-push stage (#352): the slow whole-project gates
# live in CI, which runs on a clean checkout and cannot be walked past with
# --no-verify. If an old clone still has one installed, remove it with
#   backend/.venv/Scripts/pre-commit uninstall -t pre-push
#
# Only fast checks run here, at commit time.
repos:
  - repo: local
    hooks:
      # --- commit stage (fast, staged files) ---
      - id: ruff
        name: ruff (python lint)
        entry: python scripts/venv_run.py -m ruff check --force-exclude
        language: system
        types_or: [python]
        # The gate scripts and hooks are linted too (#352): the machinery that
        # enforces the standards was the one place exempt from them. Rules come
        # from backend/pyproject.toml either way — .ruff.toml at the root
        # extends it so files outside backend/ don't fall back to ruff defaults.
        files: ^(backend|scripts|\.claude/hooks)/

      - id: file-size-guard
        name: file-size guard (split before ~1500 LOC)
        entry: python scripts/check_file_size.py
        language: system
        files: \.(py|svelte|ts|tsx)$

      - id: style-token-guard
        name: style-token guard (colors/type from tokens, design-language.md)
        entry: python scripts/check_style_tokens.py
        language: system
        files: ^frontend/src/.*\.svelte$|^frontend/src/styles\.css$

      - id: ruff-complexity
        name: ruff complexity (advisory, non-blocking)
        # --exit-zero: never fails the commit; verbose: always print the hints
        # so complexity stays visible while we burn the count down, then promote
        # these rules into the blocking `select` in backend/pyproject.toml.
        entry: python scripts/venv_run.py -m ruff check --exit-zero --no-cache --select PLR0912,PLR0913,PLR0915,C901
        language: system
        types_or: [python]
        files: ^(backend|scripts|\.claude/hooks)/
        verbose: true

      # --- push stage: NONE. CI owns the slow gates (#352) ---
      #
      # svelte-check, vitest and pytest used to run here. They now run in
      # .github/workflows/gates.yml, on a clean checkout, and duplicating them
      # locally cost more than it caught:
      #
      #   * ~5 minutes of dead time on every push, which is what makes people
      #     reach for --no-verify — the way a gate actually dies.
      #   * pre-commit's `staged_files_only` runs `git checkout -- .` REPO-WIDE
      #     and rolls back anything written during the run. A five-minute window
      #     of that in a shared working tree destroyed a concurrent session's
      #     uncommitted work (2026-07-21). The commit stage keeps a window of
      #     the same shape, but seconds long instead of minutes.
      #   * they gated the working tree, not the commits being pushed.
      #
      # Run them by hand while iterating (CLAUDE.md lists the invocations); the
      # PR check is the authority. Do NOT re-add a push stage without also
      # re-reading #352 — and note the per-clone setup no longer installs one.
