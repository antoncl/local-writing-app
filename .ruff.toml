# Repo-root ruff config, for the Python that lives OUTSIDE backend/: the gate
# scripts themselves (scripts/, .claude/hooks/). Without this, ruff walking up
# from those files finds no config and silently falls back to its defaults
# (E4/E7/E9/F) — a weaker rule set than the code they police (#352).
#
# The rules stay defined once, in backend/pyproject.toml; this only widens
# where they apply. Backend files are unaffected: ruff resolves the *nearest*
# config, which for them is still backend/pyproject.toml.
extend = "backend/pyproject.toml"
