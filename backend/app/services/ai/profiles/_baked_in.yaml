# OpenRouter is intentionally sparse here — the live /api/v1/models
# endpoint returns hundreds of models with rich metadata (pricing,
# context, capabilities). We rely on live data and only fall back to
# this tiny seed when offline.
openrouter:
  - id: anthropic/claude-sonnet-4.6
    display_name: Sonnet 4.6 (via OpenRouter)
    context_window: 200000
    tier: balanced
    capabilities: [vision, tools, caching]
  - id: openai/gpt-4o
    display_name: GPT-4o (via OpenRouter)
    context_window: 128000
    tier: balanced
    capabilities: [vision, tools, caching]

# Ollama is per-machine and discovered via /api/tags. No bake-in models —
# the list is whatever the user has pulled locally. Keep the key here
# (even if empty) so the YAML structure is uniform.
ollama: []
