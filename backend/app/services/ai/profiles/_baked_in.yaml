# Fallback model catalogue per provider.
#
# Used when live discovery fails (offline, API down). For providers that
# don't publish pricing via /v1/models (Anthropic, OpenAI), this file is
# ALSO the source of tier + cost data even when discovery succeeds —
# discovery only confirms which model ids exist; tier/cost gets merged
# from here.
#
# Per [docs/ai-model-selection.md](../../../../../docs/ai-model-selection.md).
#
# Maintenance: when a new model drops, add a line here. When a model
# sunsets, set `deprecated: true` and add `sunset_date` + `successor`.
# Prices in USD per 1M tokens; check provider pricing pages before edits.
# Last hand-audit: 2026-06-20.

anthropic:
